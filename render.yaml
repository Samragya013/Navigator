# ========================================
# RENDER.COM DEPLOYMENT CONFIGURATION
# ========================================
# Native Node.js deployment (no Docker required)
# Push this to GitHub and Render will auto-deploy

services:
  # Backend Service - Native Node.js
  - type: web
    name: navigator-backend
    env: node
    plan: free
    region: virginia
    repo: https://github.com/Samragya013/Navigator.git
    branch: main
    
    # Root directory where package.json is located
    rootDir: backend
    
    # Build and start configuration
    buildCommand: npm install --production
    startCommand: node backend/server.js
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENROUTE_ENABLED
        value: "true"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        fromService:
          type: static_site
          name: navigator-frontend
          property: url
    
    # Health check configuration
    healthCheckPath: /api/health
    healthCheckInterval: 60
    
    # Auto-deploy on GitHub push
    autoDeployOnPush: true

  # Frontend Service - Static Site
  - type: static_site
    name: navigator-frontend
    repo: https://github.com/Samragya013/Navigator.git
    branch: main
    publishPath: frontend
    
    # Build config
    buildCommand: echo "Frontend ready"
    
    # Auto-deploy
    autoDeployOnPush: true
