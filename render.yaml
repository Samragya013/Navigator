# ========================================
# RENDER.COM DEPLOYMENT CONFIGURATION
# ========================================
# Full-stack deployment: Backend API + Frontend in ONE Web Service
# Native Node.js deployment (no Docker required)
# Push this to GitHub and Render will auto-deploy

services:
  # Single Web Service - Backend API + Frontend Static Files Combined
  - type: web
    name: navigator-fullstack
    env: node
    plan: free
    region: singapore
    repo: https://github.com/Samragya013/Navigator.git
    branch: main
    rootDir: backend

    # Build and start configuration
    buildCommand: npm ci --production
    startCommand: npm start

    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENROUTE_ENABLED
        value: "true"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: LOG_LEVEL
        value: info

    # Health check configuration
    healthCheckPath: /api/health
    healthCheckInterval: 60

    # Auto-deploy on GitHub push
    autoDeployOnPush: true
