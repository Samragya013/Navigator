name: Deploy to Netlify & Render

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  NODE_VERSION: '18'

jobs:
  frontend-to-netlify:
    name: Deploy Frontend to Netlify
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Netlify CLI
        run: npm install -g netlify-cli
      
      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=frontend
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      - name: Post deployment comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Frontend deployed to Netlify!'
            })

  backend-check:
    name: Check Backend Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install backend dependencies
        run: cd backend && npm install
      
      - name: Run backend tests (if available)
        run: cd backend && npm test
        continue-on-error: true
      
      - name: Check for required env variables
        run: |
          if ! grep -q "FIREBASE_PROJECT_ID" backend/.env; then
            echo "❌ Firebase not configured"
            exit 1
          fi
          echo "✅ Firebase configuration found"

  frontend-check:
    name: Check Frontend Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Verify frontend files
        run: |
          files=("frontend/index.html" "frontend/app.js" "frontend/map.js" "frontend/styles.css")
          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              exit 1
            fi
            echo "✅ Found: $file"
          done

  security-check:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check if .env is in gitignore
        run: |
          if grep -q "\.env" .gitignore; then
            echo "✅ .env is in .gitignore (Good!)"
          else
            echo "⚠️  Warning: .env might be committed"
          fi
      
      - name: Check for secrets in code
        run: |
          if grep -r "FIREBASE_PRIVATE_KEY" frontend/ 2>/dev/null; then
            echo "❌ Warning: Firebase keys found in frontend code!"
            exit 1
          fi
          echo "✅ No Firebase keys found in frontend code"

  success-notification:
    name: Deployment Success
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check, security-check]
    if: success()
    steps:
      - run: echo "✅ All checks passed! Your app is ready for deployment."
