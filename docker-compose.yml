# Docker Compose Configuration
# Usage: docker-compose up -d (from project root directory)

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: navigator-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - OPENROUTE_ENABLED=true
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
      # Add your Firebase credentials here if needed
      # - FIREBASE_PROJECT_ID=your-id
      # - FIREBASE_PRIVATE_KEY=your-key
      # - FIREBASE_CLIENT_EMAIL=your-email
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - navigator-network
    restart: unless-stopped

  # Optional: Lightweight web server for frontend
  frontend:
    image: nginx:alpine
    container_name: navigator-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - navigator-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  navigator-network:
    driver: bridge

volumes:
  node_modules:
